<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="AJAIA job posting generator for creating multiple role-specific JD variants." />
  <title>AJAIA Job Posting Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>

<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z" />
            <path d="M2 17l10 5 10-5" />
            <path d="M2 12l10 5 10-5" />
          </svg>
        </div>
        <div>
          <h1>AJAIA Job Posting Agent</h1>
          <p class="tagline">Generate AJAIA-ready job titles and JD variants.</p>
        </div>
      </div>
      <div class="status" id="healthStatus">
        <span class="status-dot"></span>
        Checking API...
      </div>
    </header>

    <section class="content">
      <form class="card input-card" id="jobForm">
        <div class="card-header">
          <h2>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path
                d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
            </svg>
            Role Input
          </h2>
        </div>

        <div class="form-group">
          <label for="jobTitleInput">Job Title <span class="required">*</span></label>
          <input id="jobTitleInput" name="job_title" placeholder="e.g. Full Stack Product Engineer" required />
        </div>

        <div class="form-group">
          <label for="descriptionInput">Description <span class="required">*</span></label>
          <textarea id="descriptionInput" name="description" rows="4"
            placeholder="Describe the role in a few lines - what the person will build and own. The AI generates the full posting (overview, responsibilities, requirements, tech stack, benefits) from this."
            required></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="jobTypeInput">Job Type <span class="required">*</span></label>
            <select id="jobTypeInput" name="job_type" required>
              <option value="" disabled selected>Select job type</option>
              <option value="Remote">Remote</option>
              <option value="Onsite">Onsite</option>
              <option value="Hybrid">Hybrid</option>
            </select>
          </div>
          <div class="form-group">
            <label for="compensationInput">Compensation <span class="required">*</span></label>
            <input id="compensationInput" name="compensation" placeholder="e.g. $700-$1000/month" required />
          </div>
        </div>

        <div class="form-group slide-field" id="jobLocationGroup" hidden>
          <label for="jobLocationInput">Job Location <span class="required">*</span></label>
          <input id="jobLocationInput" name="job_location" placeholder="e.g. New York, NY" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="aiExperienceInput">AI Experience <span class="required">*</span></label>
            <select id="aiExperienceInput" name="ai_experience" required>
              <option value="1">1 - Basic awareness</option>
              <option value="2">2 - Comfortable user</option>
              <option value="3" selected>3 - Applied practitioner</option>
              <option value="4">4 - Advanced operator</option>
              <option value="5">5 - AI expert</option>
            </select>
          </div>
          <div class="form-group">
            <label for="variantCountInput">Variants <span class="required">*</span></label>
            <select id="variantCountInput" name="variant_count" required>
              <option value="1" selected>1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
              <option value="8">8</option>
              <option value="9">9</option>
              <option value="10">10</option>
            </select>
          </div>
        </div>

        <button type="submit" id="generateButton" class="btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
          </svg>
          Generate Variants
        </button>
      </form>

      <section class="card output-card" id="outputSection" style="display:none;">
        <div class="card-header">
          <h2>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="16" y1="13" x2="8" y2="13" />
              <line x1="16" y1="17" x2="8" y2="17" />
            </svg>
            Generated Variants
          </h2>
          <button type="button" class="btn-ghost" id="copyJson">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
            </svg>
            Copy JSON
          </button>
        </div>

        <div id="message" class="message"></div>
        <div id="resultView" class="result empty"></div>
      </section>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>

</html>
