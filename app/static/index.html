<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description"
    content="AI-powered job posting generator — enter a role and let AI craft a professional job post instantly." />
  <title>AI Job Posting Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>

<body>
  <div class="bg-glow"></div>

  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z" />
            <path d="M2 17l10 5 10-5" />
            <path d="M2 12l10 5 10-5" />
          </svg>
        </div>
        <div>
          <h1>AI Job Posting Agent</h1>
          <p class="tagline">Describe a role. Let AI craft the perfect job post.</p>
        </div>
      </div>
      <div class="status" id="healthStatus">
        <span class="status-dot"></span>
        Checking API…
      </div>
    </header>

    <section class="content">
      <form class="card input-card" id="jobForm">
        <div class="card-header">
          <h2>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path
                d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
            </svg>
            Job Input
          </h2>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="roleInput">Role Title <span class="required">*</span></label>
            <input id="roleInput" name="role" placeholder="e.g. Senior AI Engineer, Product Manager…" required />
          </div>
          <div class="form-group">
            <label for="experienceInput">Experience Level <span class="required">*</span></label>
            <input id="experienceInput" name="experience" placeholder="e.g. 3-5 years, Senior…" required />
          </div>
        </div>

        <div class="form-group">
          <label for="descriptionInput">Additional Context <span class="optional">(Pay, Work type, Additional Knoweldge,
              etc)</span></label>
          <textarea id="descriptionInput" name="description" rows="3"
            placeholder="Company name, team context, requirements, tone, salary, remote/hybrid, tech stack…"></textarea>
        </div>

        <button type="submit" id="generateButton" class="btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
          </svg>
          Generate Job Post
        </button>
      </form>

      <section class="card output-card" id="outputSection" style="display:none;">
        <div class="card-header">
          <h2>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="16" y1="13" x2="8" y2="13" />
              <line x1="16" y1="17" x2="8" y2="17" />
            </svg>
            Generated Output
          </h2>
          <button type="button" class="btn-ghost" id="copyJson">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
            </svg>
            Copy JSON
          </button>
        </div>

        <div id="message" class="message"></div>
        <div id="resultView" class="result empty"></div>

      </section>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>

</html>
